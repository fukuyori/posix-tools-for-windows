# tail ハイライト設定ファイル
# 正規表現は POSIX ERE 互換（リテラル文字列 '' 推奨）

# エラー系（赤背景）
[[rule]]
pattern = '(ERROR|FATAL|FAILED)'
fg = "white"
bg = "red"
bold = true

# 大文字小文字を区別しないエラー
[[rule]]
pattern = '(?i)exception'
fg = "red"
bold = true

# 警告系（黄色）
[[rule]]
pattern = '(WARN|WARNING)'
fg = "yellow"
bold = true

# 情報系（シアン）
[[rule]]
pattern = 'INFO'
fg = "cyan"

# デバッグ（薄灰色）
[[rule]]
pattern = 'DEBUG'
fg = { index = 245 }
dim = true

# 成功（緑）
[[rule]]
pattern = '(SUCCESS|OK|DONE|COMPLETE)'
fg = "green"
bold = true

# 日付 (YYYY-MM-DD または YYYY/MM/DD)
[[rule]]
pattern = '[0-9]{4}[-/][0-9]{2}[-/][0-9]{2}'
fg = { index = 117 }

# 時刻 (HH:MM:SS)
[[rule]]
pattern = '[0-9]{2}:[0-9]{2}:[0-9]{2}'
fg = { index = 117 }

# IPアドレス
[[rule]]
pattern = '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}'
fg = "magenta"

# URL
[[rule]]
pattern = 'https?://[^ ]*'
fg = "blue"
underline = true

# 角括弧で囲まれた内容 [xxx]
[[rule]]
pattern = '\[[^]]+\]'
fg = "cyan"
